name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-and-deploy:
    runs-on: fuyumori-net-runner
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Run isolated pytest suite
        run: ./scripts/pytest-safe.sh /app/tests -q

      - name: Deploy locally on runner host
        run: ./scripts/deploy.sh main
