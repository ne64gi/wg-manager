name: ci

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v4

      - name: Prepare env
        run: |
          cp .env.example .env
          sed -i 's/^WG_SERVER_ENDPOINT=.*/WG_SERVER_ENDPOINT=127.0.0.1/' .env || true
          sed -i 's/^WG_JWT_SECRET_KEY=.*/WG_JWT_SECRET_KEY=ci-secret-key/' .env || true
          {
            echo "WG_BOOTSTRAP_ADMIN_USERNAME=admin"
            echo "WG_BOOTSTRAP_ADMIN_PASSWORD=admin123456"
          } >> .env

      - name: Build and start stack
        run: |
          docker compose up -d --build

      - name: Wait for API health
        run: |
          for i in $(seq 1 60); do
            if docker compose exec -T wg-studio-api python -c "import urllib.request; print(urllib.request.urlopen('http://127.0.0.1:8000/health').read().decode())"; then
              exit 0
            fi
            sleep 2
          done
          echo "API health check failed"
          docker compose ps
          docker compose logs --no-color
          exit 1

      - name: CLI smoke
        run: |
          docker compose --profile tools run --rm wg-studio-cli setup-status

      - name: E2E smoke
        run: |
          docker compose --profile test run --rm wg-studio-e2e

      - name: Dump logs on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs --no-color > ci-docker.log || true
          tail -n 300 ci-docker.log || true

      - name: Cleanup
        if: always()
        run: |
          docker compose down -v