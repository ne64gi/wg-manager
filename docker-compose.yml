services:
  wireguard:
    build:
      context: .
      dockerfile: docker/wireguard/Dockerfile
    container_name: wg-studio-wireguard
    network_mode: host
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - TZ=Asia/Tokyo
    volumes:
      - ./config:/config
      - ./data:/data
      - /lib/modules:/lib/modules:ro
    restart: unless-stopped

  wg-studio-api:
    build:
      context: .
    container_name: wg-studio-api
    working_dir: /app
    command: ["uvicorn", "app.api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      - DATABASE_URL=sqlite:////data/wg-studio.db
      - LOG_DATABASE_URL=sqlite:////data/wg-studio-log.db
      - ARTIFACT_ROOT=/wg/config
      - WG_CONTAINER_NAME=wg-studio-wireguard
      - WG_INTERFACE_NAME=wg0
      - WG_CONTAINER_CONFIG_PATH=/config/wg_confs/wg0.conf
    volumes:
      - ./app:/app/app
      - ./data:/data
      - ./config:/wg/config
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"

  wg-studio-cli:
    build:
      context: .
    container_name: wg-studio-cli
    working_dir: /app
    entrypoint: ["python", "-m", "app.cli.main"]
    environment:
      - DATABASE_URL=sqlite:////data/wg-studio.db
      - LOG_DATABASE_URL=sqlite:////data/wg-studio-log.db
      - ARTIFACT_ROOT=/wg/config
      - WG_STUDIO_API_URL=http://wg-studio-api:8000
    volumes:
      - ./app:/app/app
      - ./data:/data
      - ./config:/wg/config
      - ./tests:/app/tests
