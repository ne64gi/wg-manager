services:
  postgres:
    image: postgres:17
    container_name: wg-studio-postgres
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    networks:
      - wg-studio-internal

  wireguard:
    build:
      context: .
      dockerfile: docker/wireguard/Dockerfile
    container_name: wg-studio-wireguard
    network_mode: host
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    env_file:
      - .env
    volumes:
      - ./config:/config
      - /lib/modules:/lib/modules:ro
    restart: unless-stopped

  wg-studio-api:
    build:
      context: .
    container_name: wg-studio-api
    working_dir: /app
    command: ["uvicorn", "app.api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./app:/app/app
      - ./config:/wg/config
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - wg-studio-internal

  wg-studio-cli:
    build:
      context: .
    container_name: wg-studio-cli
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["python", "-m", "app.cli.main"]
    env_file:
      - .env
    volumes:
      - ./app:/app/app
      - ./config:/wg/config
      - ./tests:/app/tests
    networks:
      - wg-studio-internal

volumes:
  postgres_data:

networks:
  wg-studio-internal:
    internal: true
